<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Nguyễn Huy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="blog-dark-theme">

    <button class="menu-toggle-btn" id="menuToggleBtn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="sidebar-menu" id="sidebarMenu">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <button class="menu-close-btn" id="menuCloseBtn" title="Đóng">&times;</button>
        </div>
        <ul class="sidebar-links">
            <li><a href="index.html" class="sidebar-link"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="articles.html" class="sidebar-link"><i class="fas fa-newspaper"></i> Bài viết</a></li>
            <li><a href="profile.html" class="sidebar-link active"><i class="fas fa-user-astronaut"></i> Profile</a></li>
        </ul>
    </nav>

    <main class="dashboard-container">

        <!-- ===== HEADER CARD ===== -->
        <header class="profile-card-header">
            <div class="user-main-info">
                <!-- AVATAR VỚI GLOW RING -->
                <div class="avatar-wrapper">
                    <div class="avatar-ring"></div>
                    <img src="https://www.bing.com/th/id/OIP.XqUoA7h4iNOGgmJ2xeNIzQHaEK?w=277&h=211&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2" alt="Avatar" class="main-avatar">
                </div>
                <div class="user-text">
                    <h2>Nguyễn Huy</h2>
                    <div class="mini-socials">
                        <a href="https://github.com/huii404" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                        <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
                        <a href="#" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                    </div>
                </div>
            </div>

            <!-- STATS ROW -->
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-number" data-target="2">0</span>
                    <span class="stat-label">Dự án</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" data-target="10">0</span>
                    <span class="stat-label">Bài viết</span>
                </div>
            </div>
        </header>

        <!-- ===== DASHBOARD BODY ===== -->
        <div class="dashboard-body">
            <aside class="side-nav-icons">
                <div class="nav-item active" data-target="about">
                    <i class="fas fa-project-diagram"></i>
                    <span>Dự án</span>
                </div>
                <div class="nav-item" data-target="skills">
                    <i class="fas fa-layer-group"></i>
                    <span>Skills</span>
                </div>
                <div class="nav-item" data-target="hobby">
                    <i class="fas fa-tags"></i>
                    <span>Sở thích</span>
                </div>
                <div class="nav-item" data-target="photos">
                    <i class="fas fa-image"></i>
                    <span>Photos</span>
                </div>
                <div class="nav-item" data-target="contact">
                    <i class="fas fa-paper-plane"></i>
                    <span>Liên hệ</span>
                </div>
            </aside>

            <section class="main-content-area" id="dynamic-content"></section>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
